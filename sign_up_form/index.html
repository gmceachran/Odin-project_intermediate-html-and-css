<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Sign Up Form</title>
</head>
<body>
  <section class="left" aria-label="odin-logo">
    <div class="logo-container">
      <img src="images/odin-logo.png" alt="Odin Logo" class="logo">
      Odin
    </div> 
    <p class="photo-credit">Photo by <a href="https://unsplash.com/@haliewestphoto">Haley West</a> on <a href="https://unsplash.com/">Unsplash</a></p>
  </section>
  <section class="right">
    <div class="intro-text">
      <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started!</p>
      <p>You <em>know</em> you want to.</p>
    </div>
    <form action="some/place" method="post">
      <h2>Let's do this!</h2>
      <fieldset>
       <div class="inputs" id="first-name">
        <label for="first_name">FIRST NAME</label>
        <input type="text" id="first_name" name="first_name" required>
       </div>
       <div class="inputs" id="last-name">
        <label for="last_name">LAST NAME</label>
        <input type="text" id="last_name" name="last_name" required>
       </div>
       <div class="inputs" id="email">
        <label for="user_email">EMAIL</label>
        <input type="email" id="user_email" name="email" required>
       </div>
       <div class="inputs" id="phone-number">
        <label for="phone_number">PHONE NUMBER</label>
        <input type="tel" id="phone_number" name="phone_number" required>
       </div>
       <div class="inputs" id="password">
        <label for="user_password">PASSWORD</label>
        <input type="password" id="user_password" name="password" minlength="8" maxlength="30" required>
       </div>
       <div class="inputs" id="confirm-password">
        <label for="confirm_user_password">CONFIRM PASSWORD</label>
        <input type="password" id="confirm_user_password" name="confirm_password" minlength="8" maxlength="30" required>
       </div>
      </fieldset>
      <div class="sign-in-links">
        <button class="create-account">Create Account</button>
        <p class="account-exists">Already have an account? <a href="some_link" id="log-in">Log in</a></p>
      </div>
    </form>
  </section>
</body>
</html>
